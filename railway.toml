[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && npm ci && npm run build"

[deploy]
startCommand = "php artisan config:clear && php artisan config:cache && php artisan migrate --force && php artisan db:seed --class=AdminUserSeeder --force && php artisan storage:link --force && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
httpPath = "/up"
timeout = 30
